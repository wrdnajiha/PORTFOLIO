<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WARDINA NAJIHAH · Contact</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="portfolio-wrapper">

  <!-- ===== TOP NAV ===== -->
  <nav class="top-nav">
    <div class="logo-area">
      <div class="logo-icon">
        <span>WN</span>
        <div class="logo-glow"></div>
      </div>
      <div class="logo-text">WARDINA <span>NAJIHAH</span></div>
    </div>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="about.html"><i class="fas fa-user"></i> About</a>
      <a href="resume.html"><i class="fas fa-file-alt"></i> Resume</a>
      <a href="portfolio.html"><i class="fas fa-th-large"></i> Projects</a>
      <a href="contact.html" class="active"><i class="fas fa-envelope"></i> Contact</a>
    </div>
  </nav>

  <!-- ===== CONTACT PAGE ===== -->
  <section class="contact-page">
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
      <div class="shape shape-4"></div>
      <div class="shape shape-5"></div>
    </div>

    <div class="contact-content">

      <!-- ===== CONTACT HEADER ===== -->
      <div class="contact-header">
        <h1><i class="fas fa-envelope"></i> Get in Touch</h1>
        <p>Let's collaborate on your next project</p>
      </div>

      <!-- ===== CONTACT GRID ===== -->
      <div class="contact-grid">

        <!-- ===== LEFT: CONTACT INFO ===== -->
        <div class="contact-info">
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
            <div class="contact-detail">
              <h4>Email</h4>
              <p>njhhrsmdi@gmail.com</p>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-phone"></i></div>
            <div class="contact-detail">
              <h4>Phone</h4>
              <p>+60 11-17975925</p>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div class="contact-detail">
              <h4>Location</h4>
              <p>Kuantan, Pahang</p>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-link"></i></div>
            <div class="contact-detail">
              <h4>Social</h4>
              <div class="contact-social-links">
                <a href="https://www.linkedin.com/in/wardina-najihah" target="_blank" class="contact-social-link linkedin"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/wrdnajiha" target="_blank" class="contact-social-link github"><i class="fab fa-github"></i></a>
                <a href="https://wrdnajiha.github.io/PORTFOLIO/" target="_blank" class="contact-social-link portfolio"><i class="fas fa-globe"></i></a>
              </div>
            </div>
          </div>
        </div>

        <!-- ===== RIGHT: CONTACT FORM ===== -->
        <div class="contact-form">
          <form id="contactForm" onsubmit="sendMessage(event)">
            <div class="form-group">
              <label for="name"><i class="fas fa-user"></i> Your Name</label>
              <input type="text" id="name" placeholder="Enter your name" required />
            </div>
            <div class="form-group">
              <label for="email"><i class="fas fa-envelope"></i> Your Email</label>
              <input type="email" id="email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
              <label for="subject"><i class="fas fa-tag"></i> Subject</label>
              <input type="text" id="subject" placeholder="Subject" />
            </div>
            <div class="form-group">
              <label for="message"><i class="fas fa-comment"></i> Message</label>
              <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
            </div>
            <button type="submit" class="btn-send">
              <i class="fas fa-paper-plane"></i> Send Message
            </button>
          </form>
        </div>

      </div>

    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer-compartment">
    <span><i class="far fa-copyright"></i> 2026 · WARDINA NAJIHAH</span>
    <span><i class="fas fa-code"></i> built with sublime · interactive media</span>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
